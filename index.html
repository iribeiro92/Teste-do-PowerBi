<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power BI Embed - Versão 1.1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>Power BI Embed</h1>
      <p>Versão de teste 1.1</p>
    </header>

    <section class="preview">
      <h2>Visualização</h2>
      <div class="iframe-wrapper">
        <div id="framePlaceholder" class="placeholder">
          Cole o link do embed e clique em "Carregar Iframe" para ver o relatório.
        </div>
        <iframe id="powerbiFrame" title="Power BI Embed" src="about:blank" allowfullscreen loading="lazy" hidden></iframe>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
